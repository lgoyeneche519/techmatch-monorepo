services:
  postgres:
    image: postgres:16
    container_name: techmatch-postgres
    restart: always
    environment:
      POSTGRES_DB: techmatch
      POSTGRES_USER: techmatch_user
      POSTGRES_PASSWORD: techmatch_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d

volumes:
  postgres_data: